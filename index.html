<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Special Pancake</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <h1>Image overlay</h1>
        <p class="lede">Upload an image. The banner is fitted to the full width at the bottom.</p>
      </header>

      <main class="workspace">
        <section class="panel controls-panel">
          <div class="section-head">
            <h2>Upload</h2>
          </div>

          <label class="dropzone" for="source-image">
            <input id="source-image" type="file" accept="image/*" />
            <span class="dropzone-title">Choose image</span>
            <span class="dropzone-copy">JPG, PNG, WEBP, GIF</span>
          </label>

          <div class="action-row">
            <button id="download-button" class="primary-button" type="button" disabled>
              Download
            </button>
            <button id="reset-button" class="ghost-button" type="button" disabled>
              Reset
            </button>
          </div>

          <p id="status-text" class="status-text" aria-live="polite">
            No image selected.
          </p>

          <div class="badge-preview">
            <div>
              <h3>Overlay</h3>
            </div>
            <img
              src="deactivated-account.png"
              alt="Deactivated account badge"
              width="342"
              height="88"
            />
          </div>
        </section>

        <section class="panel preview-panel">
          <div class="section-head">
            <h2>Preview</h2>
          </div>

          <div class="preview-frame">
            <div id="empty-state" class="empty-state">
              <p>No image</p>
              <span>Preview will appear here.</span>
            </div>
            <canvas id="preview-canvas" hidden></canvas>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
